name: Stock Bot Schedule

on:
  schedule:
    - cron: '15 1 * * 1-5'  # 09:15
    - cron: '0 3 * * 1-5'   # 11:00
    - cron: '0 4 * * 1-5'   # 12:00
    - cron: '30 5 * * 1-5'  # 13:30
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore Price History
        uses: actions/cache@v3
        with:
          path: price_history.json
          key: stock-price-cache-${{ github.run_id }}
          restore-keys: stock-price-cache-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance requests pytz

      - name: Run script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      - name: Save Price History
        uses: actions/cache@v3
        with:
          path: price_history.json
          key: stock-price-cache-${{ github.run_id }}
