name: Stock Bot Schedule

on:
  schedule:
    # 台灣時間 = UTC + 8
    - cron: '15 1 * * 1-5'  # 09:15 台灣
    - cron: '0 3 * * 1-5'   # 11:00 台灣
    - cron: '0 4 * * 1-5'   # 12:00 台灣
    - cron: '30 5 * * 1-5'  # 13:30 台灣
  workflow_dispatch: # 讓你可以手動執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance requests pytz
      - name: Run script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py
