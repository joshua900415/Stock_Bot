name: Stock Bot Schedule

on:
  schedule:
    # 台灣時間 = UTC + 8
    # 01:00 UTC = 09:00 台灣
    # 02:00 UTC = 10:00 台灣
    # 03:00 UTC = 11:00 台灣
    # 04:00 UTC = 12:00 台灣
    # 05:00 UTC = 13:00 台灣
    - cron: '0 1 * * 1-5'  # 09:00
    - cron: '0 2 * * 1-5'  # 10:00
    - cron: '0 3 * * 1-5'  # 11:00
    - cron: '0 4 * * 1-5'  # 12:00
    - cron: '0 5 * * 1-5'  # 13:00
  workflow_dispatch: # 讓你可以隨時手動點擊測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore Price History
        uses: actions/cache@v3
        with:
          path: price_history.json
          key: stock-price-cache-${{ github.run_id }}
          restore-keys: stock-price-cache-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance requests pytz

      - name: Run script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      - name: Save Price History
        uses: actions/cache@v3
        with:
          path: price_history.json
          key: stock-price-cache-${{ github.run_id }}
